sandbox_mode = "workspace-write"
personality = "pragmatic"
model = "gpt-5.4"
model_reasoning_effort = "high"

[history]
persistence = "save-all"
max_bytes = 52428800

[shell_environment_policy]
inherit = "core"
experimental_use_profile = true

[agents.orchestrator]
config_file = "./agents/orchestrator.toml"

[agents.architect]
config_file = "./agents/architect.toml"

[agents.planner]
config_file = "./agents/planner.toml"

[agents.implementer]
config_file = "./agents/implementer.toml"

[agents.reviewer]
config_file = "./agents/reviewer.toml"

[agents.verifier]
config_file = "./agents/verifier.toml"

[profiles.safe-readonly]
sandbox_mode = "read-only"

[profiles.deep-think]
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

[profiles.fast-iterate]
model_reasoning_effort = "low"
plan_mode_reasoning_effort = "medium"
model_verbosity = "low"

[projects."/Users/nathan/code/managed-platforms"]
trust_level = "trusted"

[projects."/Users/nathan/.codex"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["git-branch", "model-with-reasoning", "context-remaining", "five-hour-limit", "weekly-limit"]
