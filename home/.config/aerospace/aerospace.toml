start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign (ISO keyboards only, european keyboards only)
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

cmd-semicolon = 'mode service'
cmd-shift-1 = 'mode kick'
cmd-shift-2 = 'mode distribute'

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-period = 'layout tiles accordion'

cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

cmd-ctrl-alt-h = 'join-with left'
cmd-ctrl-alt-j = 'join-with down'
cmd-ctrl-alt-k = 'join-with up'
cmd-ctrl-alt-l = 'join-with right'

alt-h = 'focus left --boundaries-action wrap-around-the-workspace'
cmd-alt-h = 'focus left --boundaries-action wrap-around-the-workspace'
cmd-alt-j = 'focus down --boundaries-action wrap-around-the-workspace'
cmd-alt-k = 'focus up --boundaries-action wrap-around-the-workspace'
cmd-alt-l = 'focus right --boundaries-action wrap-around-the-workspace'

cmd-shift-minus = 'resize smart -50'
cmd-shift-equal = 'resize smart +50'
alt-enter = 'fullscreen'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
cmd-alt-3 = 'workspace 3' # alt-3 = hash symbol
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-a = 'workspace A'
alt-b = 'workspace B'
alt-c = 'workspace C'
alt-d = 'workspace D'
alt-e = 'workspace E'
alt-f = 'workspace F'
alt-g = 'workspace G'
alt-i = 'workspace I'
alt-m = 'workspace M'
alt-n = 'workspace N'
alt-o = 'workspace O'
alt-p = 'workspace P'
alt-q = 'workspace Q'
cmd-alt-r = 'workspace R' # alt-r = excalidraw view-mode
alt-s = 'workspace S'     # alt-s = excalidraw Snap to objects
alt-t = 'workspace T'
alt-u = 'workspace U'
alt-v = 'workspace V'
alt-w = 'workspace W'
alt-x = 'workspace X'
alt-y = 'workspace Y'
cmd-alt-z = 'workspace Z' # alt-z = excalidraw Zen mode

